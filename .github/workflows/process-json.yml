name: Process JSON from S3

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  process-json:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      HUSKY: 0 # Huskyをスキップする

    steps:
      - name: '📝 Checkout repository'
        uses: actions/checkout@v4

      - name: '📦 Install pnpm'
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false

      - name: '📦 Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'
          cache: 'pnpm'

      - name: '📦 Install dependencies'
        run: pnpm install

      - name: '⛈️ Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: '🕒 Download JSON from S3'
        run: pnpm json:dl
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}

      - name: '🗄️ Convert JSON'
        run: pnpm json:conv

      - name: '🧹 Remove duplicate raw data'
        run: pnpm json:remove-duplicates

      - name: '🥳 Fetch and insert tweets'
        run: pnpm json:fetch-tweet

      - name: '📇 Build tweet index'
        run: pnpm json:build-index

      - name: '🔗 Extract URLs from tweets'
        run: pnpm json:extract-urls

      - name: '📊 Build activity data'
        run: pnpm json:build-activity

      - name: '🌳 Build garden stats'
        # トップの「讚の庭」桜バナー用 (public/garden-stats.json)。
        # totalLikes/elapsedDays は今 enrich した JSON から、カテゴリ別の花色比率は
        # コミット済み data/likes.db から集計する。
        run: pnpm json:build-garden

      # SQLite (data/likes.db) への取り込み・embedding 生成・サイトビルドは
      # ここでは行わない。ローカルで `pnpm db:migrate && pnpm ai:embed && pnpm build`
      # をまとめて流す運用 (溜まったときに手動)。

      - name: '🧀 Commit and push if changed'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 chore: 自動処理によるJSONデータ更新" && git push)
